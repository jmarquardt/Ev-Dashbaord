<!DOCTYPE html> 

<html lang="de"> 

<head> 

<meta charset="UTF-8"> 

<meta name="viewport" content="width=device-width, initial-scale=1"> 

<title>EV Dashboard</title> 

 

css/main.css 

</head> 

 

<body> 

 

<header> 

  <h1>EV Dashboard</h1> 

</header> 

 

<section class="controls"> 

 

  <div class="control"> 

    <label>Strecke</label> 

    <input 

      type="range" 

      id="distance" 

      min="100" 

      max="2000" 

      value="1000"> 

    <span id="distanceVal">1000 km</span> 

  </div> 

 

  <div class="control"> 

    <label>Saison</label> 

    <select id="season"> 

      <option value="summer">Sommer</option> 

      <option value="winter">Winter</option> 

    </select> 

  </div> 

 

</section> 

 

<main id="cards"></main> 

 

js/models.jsscript> 

js/calculator.jsscript> 

js/app.jsscript> 

 

</body> 

</html>
